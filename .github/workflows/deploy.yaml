name: Deploy SistemToko Dashboard
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint check
        run: |
          pip install ruff
          ruff check .
      - name: Build Docker image
        run: docker build -t ghcr.io/sann2267/sistemtoko-dashboard:latest dashboard/
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push image
        run: docker push ghcr.io/sann2267/sistemtoko-dashboard:latest
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/sann2267/sistemtoko-dashboard:latest
            docker stop sistemtoko-dashboard || true
            docker rm sistemtoko-dashboard || true
            docker run -d \
              --name sistemtoko-dashboard \
              --restart unless-stopped \
              -p 5000:5000 \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e DYNAMO_TABLE_NAME="${{ secrets.DYNAMO_TABLE_NAME }}" \
              -e ATHENA_DATABASE="${{ secrets.ATHENA_DATABASE }}" \
              -e ATHENA_S3_OUTPUT="${{ secrets.ATHENA_S3_OUTPUT }}" \
              -e SNS_TOPIC_ARN="${{ secrets.SNS_TOPIC_ARN }}" \
              -e FLASK_SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              -e FLASK_DEBUG="false" \
              ghcr.io/${{ env.IMAGE_NAME }}:latest